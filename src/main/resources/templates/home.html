<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Automation Test Framework</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background:#f4f6f9;
        }

        .container{
            margin-top:80px;
        }

    </style>

</head>

<body>

<div class="container text-center">

    <h1 class="mb-5">Automation Test Framework</h1>

    <div class="row justify-content-center">

        <div class="col-md-4 mb-3">
            <a href="/tests/run-ui" class="btn btn-primary w-100 p-3">
                Run UI Test
            </a>
        </div>

        <div class="col-md-4 mb-3">
            <a href="/tests/run-api" class="btn btn-success w-100 p-3">
                Run API Test
            </a>
        </div>

        <div class="col-md-4 mb-3">
            <a href="/tests/run-all" class="btn btn-warning w-100 p-3">
                Run All Tests
            </a>
        </div>

        <div class="col-md-4 mb-3">
            <a href="/dashboard" class="btn btn-info w-100 p-3">
                View Dashboard
            </a>
        </div>

        <div class="col-md-4 mb-3">
            <a href="/reports" class="btn btn-dark w-100 p-3">
                View Report
            </a>
        </div>

    </div>

</div>

</body>

</html>
